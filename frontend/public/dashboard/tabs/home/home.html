                    <div class="page-view active" id="page-home">
                        <!-- Welcome Card -->
                        <div class="welcome-card">
                            <div class="welcome-eyebrow">Welcome Back</div>
                            <h1 class="welcome-title">
                                Hello,
                                <span id="welcomeNameDisplay">User</span>! 👋
                            </h1>
                            <p class="welcome-subtitle">
                                Ready to continue your career journey?
                            </p>

                            <div class="welcome-actions">
                                <a
                                    href="admin/index.html"
                                    class="btn-continue"
                                    style="background: #f59e0b; display: none"
                                    id="adminLink"
                                >
                                    Admin Panel
                                </a>

                                <!-- Upload button: saves PDF text to Firestore only -->
                                <button
                                    id="uploadResumeBtn"
                                    class="btn-continue"
                                    style="
                                        background: transparent;
                                        color: var(--text-primary);
                                        border: 1px solid var(--border);
                                        cursor: pointer;
                                    "
                                >
                                    <svg
                                        width="18"
                                        height="18"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <path
                                            d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"
                                        ></path>
                                        <polyline
                                            points="17 8 12 3 7 8"
                                        ></polyline>
                                        <line
                                            x1="12"
                                            y1="3"
                                            x2="12"
                                            y2="15"
                                        ></line>
                                    </svg>
                                    Upload Resume
                                </button>
                                <input
                                    type="file"
                                    id="resumeFileInput"
                                    accept=".pdf"
                                    style="display: none"
                                />

                                <!-- Analyze button: reads text from Firestore → calls Gemini -->
                                <button
                                    id="analyzeResumeBtn"
                                    class="btn-continue"
                                    style="
                                        display: none;
                                        background: linear-gradient(
                                            135deg,
                                            #6366f1,
                                            #0ea5e9
                                        );
                                        color: #fff;
                                        border: none;
                                        cursor: pointer;
                                    "
                                >
                                    <svg
                                        width="18"
                                        height="18"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M12 8v4l3 3" />
                                    </svg>
                                    Analyze with AI
                                </button>

                                <!-- Saved resume name indicator -->
                                <span
                                    id="savedResumeName"
                                    style="
                                        font-size: 12px;
                                        color: var(--text-secondary);
                                        align-self: center;
                                    "
                                ></span>
                            </div>
                        </div>

                        <!-- Stats Grid -->
                        <div class="stats-grid">
                            <!-- Profile Complete -->
                            <div class="stat-card">
                                <div class="stat-icon-wrapper">
                                    <svg
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <path
                                            d="M22 11.08V12a10 10 0 1 1-5.93-9.14"
                                        ></path>
                                        <polyline
                                            points="22 4 12 14.01 9 11.01"
                                        ></polyline>
                                    </svg>
                                </div>
                                <div class="stat-value">0%</div>
                                <div class="stat-label">Profile Complete</div>
                            </div>

                            <!-- GPA / CGPA -->
                            <div class="stat-card">
                                <div class="stat-icon-wrapper">
                                    <svg
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <path
                                            d="M22 10v6M2 10l10-5 10 5-10 5z"
                                        ></path>
                                        <path
                                            d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"
                                        ></path>
                                    </svg>
                                </div>
                                <div class="stat-value" id="gpaDisplay">
                                    N/A
                                </div>
                                <div class="stat-label">GPA / CGPA</div>
                            </div>
                        </div>
